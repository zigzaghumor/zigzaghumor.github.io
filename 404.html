<!DOCTYPE HTML>
<html>
  <head>
    <title>404 Not Found</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark }}" type="image/png" />
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon }}" type="image/png" />
    <script src="./assets/js/favicon-switcher.js" type="application/javascript"></script>

    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <div class="wrapper wrapper-page">
      <main class="page-shell section-card" style="margin-top: 4rem; text-align: center;">
        <h1 class="page-title">404 Not Found</h1>
        <p class="page-lead">This is not the web page you are looking for.</p>
        <p>You will be redirected to the homepage in 5 seconds.</p>
        <p><a href="{{ '/' | relative_url }}">Return home now</a></p>
        <script>
          window.setTimeout(function () {
            window.location.href = '/';
          }, 5000);
        </script>
      </main>
    </div>
  </body>
</html>
