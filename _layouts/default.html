<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }} | {{ site.affiliation }}</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% if site.keywords %}<meta name="keywords" content="{{ site.keywords }}">{% endif %}

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }} | {{ site.affiliation }}">
    <meta property="og:url" content="{{ site.canonical }}{{ page.url }}">
    <meta property="og:site_name" content="{{ site.title }} | {{ site.affiliation }}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:locale" content="default">
    {% if site.avatar %}<meta property="og:image" content="{{ site.avatar }}">{% endif %}
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }} | {{ site.affiliation }}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% if site.avatar %}<meta name="twitter:image" content="{{ site.avatar }}">{% endif %}

    {% if site.canonical %}<link rel="canonical" href="{{ site.canonical }}{{ page.url }}" />{% endif %}
    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark }}" type="image/png" />
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon }}" type="image/png" />
    <script src="{{ '/assets/js/favicon-switcher.js' | relative_url }}" type="application/javascript"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.8.6/css/academicons.min.css" integrity="sha256-uFVgMKfistnJAfoCUQigIl+JfUaP47GrRKjf6CTPVmw=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <script>
      function myFunction() {
        var links = document.getElementById('myLinks');
        var icon = document.querySelector('.topnav a.icon');
        links.classList.toggle('open');
        icon.classList.toggle('active');
      }
    </script>
  </head>
  <body>
    <div class="topnav">
      <a class="nav-home-badge" href="{{ '/' | relative_url }}">Zhihang Zhao</a>
      <div id="myLinks">{% include navigation.md %}</div>
      <a href="javascript:void(0);" class="icon" onclick="myFunction()" aria-label="Toggle navigation">
        <span class="icon-wrap">
          <i class="fa fa-bars icon-bars"></i>
          <i class="fa fa-xmark icon-xmark"></i>
        </span>
      </a>
    </div>

    <div class="wrapper wrapper-page">
      <main class="page-shell">
        {{ content }}
      </main>
    </div>
  </body>
</html>
